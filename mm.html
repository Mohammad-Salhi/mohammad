<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Agency</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  color: #333;
}
header {
  background: #fff;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}
nav {
  display: flex;
  justify-content: center;
  background: #222;
}
nav button {
  background: none;
  border: none;
  color: white;
  padding: 15px 20px;
  cursor: pointer;
  font-size: 16px;
}
nav button:hover {
  background: #4facfe;
}
.container {
  padding: 20px;
}
.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin: 10px;
  display: inline-block;
  width: 250px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
.card img {
  width: 100%;
  border-radius: 10px;
}
button.book {
  background: #4facfe;
  border: none;
  color: white;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
  cursor: pointer;
}
button.book:hover {
  background: #00c6ff;
}
footer {
  text-align: center;
  padding: 10px;
  background: #222;
  color: white;
}
</style>
</head>
<body>
<header>Travel Agency ✈️</header>
<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('packages')">Packages</button>
<button onclick="showSection('contact')">Contact</button>
</nav>
<div class="container" id="content">
<h2>Welcome to our Travel Agency 🌍</h2>
<p>Book your dream trip بسهولة!</p>
</div>
<script>
function showSection(section) {
  let content = document.getElementById('content');
  if(section === 'home') {
    content.innerHTML = `
      <h2>Welcome 🌍</h2>
      <p>Discover amazing destinations!</p>
    `;
  }
  if(section === 'packages') {
    content.innerHTML = `
      <div class='card'>
        <img src='https://picsum.photos/300/200?1'>
        <h3>Paris</h3>
        <p>$1200</p>
        <button class='book' onclick="book('Paris')">Book Now</button>
      </div>
      <div class='card'>
        <img src='https://picsum.photos/300/200?2'>
        <h3>Dubai</h3>
        <p>$900</p>
        <button class='book' onclick="book('Dubai')">Book Now</button>
      </div>
      <div class='card'>
        <img src='https://picsum.photos/300/200?3'>
        <h3>Turkey</h3>
        <p>$700</p>
        <button class='book' onclick="book('Turkey')">Book Now</button>
      </div>
    `;
  }
  if(section === 'contact') {
    content.innerHTML = `
      <h2>Contact Us 📞</h2>
      <input placeholder='Your Name'><br><br>
      <input placeholder='Email'><br><br>
      <textarea placeholder='Message'></textarea><br><br>
      <button onclick="sendMessage()">Send</button>
    `;
  }
}
function book(place) {
  alert('Booking successful for ' + place);
}
function sendMessage() {
  alert('Message sent successfully!');
}
</script>
<footer>© 2026 Travel Agency</footer>
</body>
</html>
